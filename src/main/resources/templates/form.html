<!DOCTYPE html>
<html>
<head>
    <title>Form</title>
</head>

<body bgcolor="#eef1f5" style="font-family:Arial; margin:0;">

<!-- HEADER -->
<table width="100%" bgcolor="#3f51b5" cellpadding="12">
    <tr>
        <td>
            <font color="white"><b>Form Input Mahasiswa</b></font>
        </td>
    </tr>
</table>

<br>

<table width="50%" align="center" bgcolor="white" cellpadding="20"
       style="border:1px solid #ccc;">
    <tr>
        <td>

            <b>Form Input Mahasiswa</b>

            <br><br>

            <form action="/save" method="post">

                Nama:<br>
                <input type="text" name="nama"
                       style="width:100%; padding:8px;" required>

                <br><br>

                NIM:<br>
                <input type="text" name="nim"
                       style="width:100%; padding:8px;" required>

                <br><br>

                Jenis Kelamin:<br>
                <input type="radio" name="jk" value="Laki-Laki" required> Laki-Laki<br>
                <input type="radio" name="jk" value="Perempuan"> Perempuan

                <br><br>

                <button type="submit"
                        style="padding:8px 20px; background:#3f51b5; color:white; border:none;">
                    Submit
                </button>

            </form>

            <br>

            <a href="/home">Kembali ke Home</a>

        </td>
    </tr>
</table>

</body>
</html>
