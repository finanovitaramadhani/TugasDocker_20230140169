<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<body bgcolor="#eef1f5" style="font-family:Arial; margin:0;">

<!-- HEADER -->
<table width="100%" bgcolor="#3f51b5" cellpadding="12">
    <tr>
        <td align="center">
            <font color="white"><b>LOGIN PAGE</b></font>
        </td>
    </tr>
</table>

<br><br><br>

<center>

    <table width="380" cellpadding="20" bgcolor="white"
           style="border:1px solid #ccc; border-radius:6px;">
        <tr>
            <td>

                <form action="/login" method="post">

                    <table width="100%">
                        <tr>
                            <td style="font-size:14px;">Username</td>
                        </tr>
                        <tr>
                            <td><input type="text" name="username" style="width:100%; padding:8px;" required></td>
                        </tr>

                        <tr><td><br></td></tr>

                        <tr>
                            <td style="font-size:14px;">Password</td>
                        </tr>
                        <tr>
                            <td><input type="password" name="password" style="width:100%; padding:8px;" required></td>
                        </tr>
                    </table>

                    <br>

                    <center>
                        <button type="submit"
                                style="width:100%; padding:9px; background:#3f51b5; color:white; border:none;">
                            Login
                        </button>
                    </center>

                </form>

            </td>
        </tr>
    </table>

</center>

</body>
</html>
